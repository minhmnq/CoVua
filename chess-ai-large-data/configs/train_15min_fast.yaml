data:
  train_dir: data/processed/train_planes
  valid_dir: data/processed/valid_planes
  reader_batch_rows: 16384

model:
  trunk_channels: 224
  num_res_blocks: 12

optim:
  lr: 0.0004
  weight_decay: 0.0001
  grad_clip: 1.0

train:
  device: cuda
  batch_size: 2048
  num_workers: 2
  windows_worker_cap: 4
  use_amp: true
  amp_dtype: bf16
  allow_tf32: true
  cudnn_benchmark: true
  channels_last: true
  compile: false
  torch_compile_mode: null
  prefetch_factor: 2
  persistent_workers: false
  grad_accum_steps: 1
  epochs: 1
  steps_per_epoch: 6000
  eval_steps: 300
  save_every: 1
  checkpoint_dir: outputs/checkpoints