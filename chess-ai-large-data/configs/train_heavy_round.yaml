data:
  train_dir: data/processed/strong_train
  valid_dir: data/processed/strong_valid
  reader_batch_rows: 16384

model:
  trunk_channels: 224
  num_res_blocks: 12

optim:
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0

train:
  device: cuda
  batch_size: 1024
  num_workers: 2
  windows_worker_cap: 1
  use_amp: true
  amp_dtype: bf16
  allow_tf32: true
  cudnn_benchmark: true
  channels_last: true
  compile: false
  torch_compile_mode: null
  prefetch_factor: 2
  persistent_workers: false
  grad_accum_steps: 1
  epochs: 3
  steps_per_epoch: 30000
  eval_steps: 1000
  save_every: 1
  checkpoint_dir: outputs/checkpoints
